spring.application.name=demo

# MySQL Connection Settings
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/investdb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=1234

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# DART API Settings
dart.api.key=-

# Stock(공공데이터) API Settings
stock.api.key=-
stock.api.base-url=https://apis.data.go.kr/1160100/service/GetStockSecuritiesInfoService/getStockPriceInfo

# 한국수출입은행 환율 API (https://www.koreaexim.go.kr 에서 발급)
koreaexim.api.key=-

# KRX 정보데이터시스템 Open API (https://data.krx.co.kr 에서 발급)
krx.api.key=-


