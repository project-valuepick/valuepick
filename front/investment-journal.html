<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>투자일지 — ValuePick</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/investment-journal.css" />
</head>
<body>
<div id="header-placeholder"></div>

<main class="main">
  <section class="page-head">
    <div>
      <h1>투자일지</h1>
      <p>내 투자 기록을 저장하고, 원하면 커뮤니티에 공유할 수 있습니다.</p>
    </div>
    <button class="btn-primary" id="openJournalModal" type="button">새 일지 작성</button>
  </section>

  <section class="toolbar">
    <div class="tabs" id="categoryTabs">
      <button class="tab active" data-category="all" type="button">전체</button>
      <button class="tab" data-category="buy" type="button">매수</button>
      <button class="tab" data-category="회고" type="button">회고</button>
      <button class="tab" data-category="shared" type="button">공유됨</button>
    </div>
    <div class="search-box">
      <input id="journalSearchInput" type="text" placeholder="종목명, 제목, 메모 검색" aria-label="투자일지 검색" />
    </div>
  </section>

  <section id="journalList" class="journal-list"></section>
</main>

<div class="modal-backdrop" id="journalModal" aria-hidden="true">
  <div class="modal">
    <div class="modal-head">
      <h2>새 투자일지 작성</h2>
      <button class="icon-btn" id="closeJournalModal" type="button" aria-label="모달 닫기">×</button>
    </div>
    <form id="journalForm" class="modal-form">
      <div class="form-grid">
        <label>
          제목
          <input name="title" type="text" required />
        </label>
        <label>
          종목명
          <div class="stock-input-row">
            <input id="stockNameInput" name="stockName" type="text" placeholder="종목명 입력 후 검색" required />
            <button class="btn-outline" id="openStockSearchBtn" type="button">검색</button>
          </div>
          <input id="stockCodeInput" name="stockCode" type="hidden" />
        </label>
        <label>
          기록 유형
          <select name="tradeType" required>
            <option value="매수" selected>매수</option>
            <option value="매도">매도</option>
          </select>
        </label>
        <label>
          매수일
          <input id="buyDateInput" name="buyDate" type="date" required />
        </label>
        <label>
          투자 금액 (원)
          <input name="amount" type="number" min="0" step="1000" required />
        </label>
        <label>
          현재 주가
          <div id="currentPriceDisplay" class="price-display">종목 선택 시 표시됩니다.</div>
        </label>
      </div>
      <label class="textarea-label">
        내용
        <textarea name="content" rows="5" placeholder="선택 입력 (비워도 등록 가능)"></textarea>
      </label>
      <div class="form-actions">
        <button class="btn-text" id="cancelJournal" type="button">취소</button>
        <button class="btn-primary" type="submit">등록</button>
      </div>
    </form>
  </div>
</div>

<div class="modal-backdrop" id="journalActionModal" aria-hidden="true">
  <div class="modal">
    <div class="modal-head">
      <h2 id="actionTitle">일지 관리</h2>
      <button class="icon-btn" id="closeActionModal" type="button" aria-label="모달 닫기">×</button>
    </div>
    <div class="action-body">
      <p id="actionMeta" class="meta"></p>
      <div class="action-buttons">
        <button class="btn-outline" id="toggleShareBtn" type="button">공유하기</button>
        <button class="btn-outline" id="openSellFormBtn" type="button">매도 등록</button>
        <button class="btn-danger" id="deleteJournalBtn" type="button">삭제</button>
      </div>
      <form id="sellForm" class="sell-form hidden">
        <h3>매도 등록</h3>
        <div class="form-grid">
          <label>
            매도 일시
            <input type="datetime-local" name="sellAt" required />
          </label>
          <label>
            매도 금액 (원)
            <input type="number" name="sellAmount" min="0" step="1000" required />
          </label>
        </div>
        <label class="textarea-label">
          매도 메모
          <textarea name="sellNote" rows="3" placeholder="매도 이유를 간단히 기록하세요."></textarea>
        </label>
        <div class="form-actions">
          <button class="btn-text" id="cancelSellBtn" type="button">취소</button>
          <button class="btn-primary" type="submit">매도 완료</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="stockSearchModal" aria-hidden="true">
  <div class="modal stock-search-modal">
    <div class="modal-head">
      <h2>회사 검색</h2>
      <button class="icon-btn" id="closeStockSearchModal" type="button" aria-label="모달 닫기">×</button>
    </div>
    <div class="action-body">
      <div class="search-inline">
        <input id="stockSearchKeyword" type="text" placeholder="회사명/종목코드 검색" />
      </div>
      <div id="stockSearchList" class="stock-search-list"></div>
    </div>
  </div>
</div>

<script src="js/common.js"></script>
<script src="js/investment-journal.js"></script>
</body>
</html>
