<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>데이터 수동 불러오기 — ValuePick</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
<div id="header-placeholder"></div>

<main class="main">
  <a class="back-link" href="admin.html">← 관리자 센터</a>
  <section class="page-head">
    <h1>데이터 수동 불러오기</h1>
    <p>스케줄러 대기 없이 버튼으로 즉시 업데이트합니다.</p>
  </section>

  <section class="sync-grid">
    <article class="sync-card">
      <h2>시장 지표</h2>
      <p>KOSPI/KOSDAQ/환율 지표를 최신화합니다.</p>
      <button class="btn-primary" data-sync="market" type="button">실행</button>
    </article>
    <article class="sync-card">
      <h2>종목 지표</h2>
      <p>PER/PBR/ROE/배당수익률 데이터를 갱신합니다.</p>
      <button class="btn-primary" data-sync="stocks" type="button">실행</button>
    </article>
    <article class="sync-card">
      <h2>커뮤니티 통계</h2>
      <p>게시글, 댓글, 추천 데이터를 집계합니다.</p>
      <button class="btn-primary" data-sync="community" type="button">실행</button>
    </article>
  </section>

  <section class="log-panel">
    <h3>실행 로그</h3>
    <div id="syncLog" class="log-list"></div>
  </section>
</main>

<script src="js/common.js"></script>
<script src="js/admin-data-sync.js"></script>
</body>
</html>
