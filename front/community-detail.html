<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>커뮤니티 상세 — ValuePick</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/community-detail.css" />
</head>
<body>
<div id="header-placeholder"></div>

<main class="main">
  <a class="back-link" href="community.html">← 커뮤니티로 돌아가기</a>

  <section class="post-detail" id="postDetail"></section>

  <section class="discussion-panel hidden" id="discussionPanel">
    <div class="discussion-head">
      <h2 id="discussionTitle">종목 토론 스트림</h2>
      <select id="periodFilter">
        <option value="7">1주일</option>
        <option value="30">1개월</option>
        <option value="365">1년</option>
        <option value="all">전체</option>
      </select>
    </div>
    <form id="streamForm" class="stream-form">
      <textarea name="streamText" rows="3" placeholder="해당 종목에 대한 관점/근거를 등록하세요." required></textarea>
      <button class="btn-primary" type="submit">토론 스트림 등록</button>
    </form>
    <div class="stream-list" id="streamList"></div>
  </section>
</main>

<script src="js/common.js"></script>
<script src="js/community-detail.js"></script>
</body>
</html>
