<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 — ValuePick</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-page" data-page="login">

<div id="header-placeholder"></div>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand">
      <a class="brand" href="index.html">ValuePick</a>
    </div>
    <h1 class="auth-title">로그인</h1>
    <p class="auth-desc">계정에 로그인하여 서비스를 이용해보세요.</p>

    <div class="alert" id="alertBox" role="alert" aria-live="polite"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">이메일</label>
        <input class="form-input" type="email" id="email" name="email" placeholder="example@email.com" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">비밀번호</label>
        <input class="form-input" type="password" id="password" name="password" placeholder="비밀번호 입력" autocomplete="current-password" required />
      </div>
      <button class="btn-submit" type="submit" id="submitBtn">로그인</button>
    </form>

    <div class="auth-footer">
      아직 계정이 없으신가요?
      <a href="register.html">회원가입</a>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/common.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
