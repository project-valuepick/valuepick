<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>전체 종목 리스트 — ValuePick</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/list.css" />
</head>
<body>

<div id="header-placeholder"></div>

<main class="main">
  <div class="page-header">
    <h1>전체 종목 리스트</h1>
    <p id="stockCount">총 8개 종목</p>
  </div>

  <div class="filter-bar">
    <button class="btn-filter" id="filterBtn" type="button">
      필터
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <button class="btn-reset-filter" id="resetFilterBtn" type="button" style="display:none">초기화</button>
  </div>

  <div class="filter-panel" id="filterPanel">
    <div class="filter-grid">
      <div class="filter-group">
        <label>PER</label>
        <div class="filter-range">
          <input type="number" id="perMin" placeholder="최소" min="0" step="0.1" />
          <span>~</span>
          <input type="number" id="perMax" placeholder="최대" min="0" step="0.1" />
        </div>
      </div>
      <div class="filter-group">
        <label>PBR</label>
        <div class="filter-range">
          <input type="number" id="pbrMin" placeholder="최소" min="0" step="0.1" />
          <span>~</span>
          <input type="number" id="pbrMax" placeholder="최대" min="0" step="0.1" />
        </div>
      </div>
      <div class="filter-group">
        <label>ROE (%)</label>
        <div class="filter-range">
          <input type="number" id="roeMin" placeholder="최소" min="0" step="0.1" />
          <span>~</span>
          <input type="number" id="roeMax" placeholder="최대" min="0" step="0.1" />
        </div>
      </div>
      <div class="filter-group">
        <label>배당수익률 (%)</label>
        <div class="filter-range">
          <input type="number" id="divMin" placeholder="최소" min="0" step="0.1" />
          <span>~</span>
          <input type="number" id="divMax" placeholder="최대" min="0" step="0.1" />
        </div>
      </div>
      <div class="filter-group">
        <label>시가총액 (억)</label>
        <div class="filter-range">
          <input type="number" id="capMin" placeholder="최소" min="0" step="1" />
          <span>~</span>
          <input type="number" id="capMax" placeholder="최대" min="0" step="1" />
        </div>
      </div>
    </div>
    <div class="filter-actions">
      <button class="btn-cancel" id="cancelFilter" type="button">닫기</button>
      <button class="btn-apply" id="applyFilter" type="button">적용</button>
    </div>
  </div>

  <div class="table-wrap">
    <table class="stock-table" aria-label="종목 목록">
      <thead>
        <tr>
          <th>종목명</th>
          <th data-sort="price">현재가 <span class="sort-icon">↕</span></th>
          <th data-sort="changeRate">등락률 <span class="sort-icon">↕</span></th>
          <th data-sort="marketCap">시가총액 <span class="sort-icon">↕</span></th>
          <th data-sort="per">PER <span class="sort-icon">↕</span></th>
          <th data-sort="pbr">PBR <span class="sort-icon">↕</span></th>
          <th data-sort="roe">ROE <span class="sort-icon">↕</span></th>
          <th data-sort="dividendYield">배당수익률 <span class="sort-icon">↕</span></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div class="card-list" id="cardList"></div>

  <div class="pagination" id="pagination"></div>
</main>

<script src="js/data.js"></script>
<script src="js/common.js"></script>
<script src="js/list.js"></script>
</body>
</html>
